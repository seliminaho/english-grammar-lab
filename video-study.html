<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Study - English Grammar Lab</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .video-study-main {
      padding: 4rem 2rem;
      background: var(--hero-bg);
      min-height: 100vh;
    }

    .video-study-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
    }

    .video-carousel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 3rem 0;
    }

    .carousel-btn {
      border: none;
      background: var(--primary);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: var(--shadow-medium);
    }

    .video-card {
      width: 700px;
      max-width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: var(--shadow-medium);
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      border: none;
      background: black;
    }

    .video-title {
      margin-top: 1rem;
      color: var(--text-strong);
      font-size: 1.5rem;
    }

    .video-description {
      margin-top: 0.5rem;
      color: var(--text-soft);
    }

    .script-box {
      margin-top: 2rem;
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow-medium);
    }

    .script-box h2 {
      color: var(--text-strong);
      margin-bottom: 1rem;
    }

    .script-text {
      color: var(--text);
      line-height: 1.7;
      white-space: pre-line;
    }

    .vocab-link {
      display: inline-block;
      margin-top: 1.5rem;
      text-decoration: none;
    }

    @media (max-width: 760px) {
      .video-carousel {
        gap: 0.5rem;
      }

      .carousel-btn {
        width: 38px;
        height: 38px;
        font-size: 1.2rem;
      }

      .video-card {
        padding: 1rem;
      }

      .script-box {
        padding: 1.4rem;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">

      <nav class="main-nav">
        <a href="index.html">Accueil</a>

          <h2 class="video-title" id="videoTitle"></h2>
          <p class="video-description" id="videoDescription"></p>
        </article>

        <button class="carousel-btn" id="nextBtn">›</button>
      </div>

      <section class="script-box">
        <h2>Script</h2>
        <p class="script-text" id="scriptText"></p>
        <a href="#" class="btn btn-primary vocab-link" id="vocabLink">
          S’entraîner sur le vocabulaire
        </a>
      </section>

    </div>
  </main>

    let currentVideo = 0;

    function showVideo(index) {

      videoFrame.src = video.src;
      videoTitle.textContent = video.title;
      videoDescription.textContent = video.description;
      scriptText.textContent = video.script;
      vocabLink.href = video.vocabLink;
