<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Present Simple - Flashcards</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--hero-bg);
      color: var(--text);
    }

    .site-header {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(8px);
    }


    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .flashcard-wrapper {
      width: 100%;
      max-width: 700px;
      text-align: center;
    }

    .page-title {
      font-size: 2rem;
      margin-bottom: 0.8rem;
      color: var(--text-strong);
    }

    .page-subtitle {
      color: var(--text-soft);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .card-scene {
      perspective: 1200px;
    }

    .flashcard {
      width: 100%;
      min-height: 320px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      cursor: pointer;
    }

    .flashcard.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      backface-visibility: hidden;
      box-shadow: var(--shadow-medium);
      border: 1px solid var(--border);
    }

    .card-front {
      background: var(--surface);
      color: var(--text-strong);
    }

    .card-back {
      background: var(--primary);
      color: white;
      transform: rotateY(180deg);
    }

    .card-text {
      font-size: clamp(1.5rem, 3vw, 2.3rem);
      line-height: 1.4;
      font-weight: 700;
    }

    .card-label {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }

    .helper-text {
      margin-top: 1.5rem;
      color: var(--text-soft);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .flashcard {
        min-height: 260px;
      }

      .card-face {
        padding: 1.4rem;
      }

      .page-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container header-content">
      <div class="logo">English Grammar Lab</div>

      <nav class="main-nav">
        <a href="../../index.html">Accueil</a>
        <a href="../../#categories">Exercices</a>
        <button class="theme-toggle" id="themeToggle">🌙</button>
      </nav>
    </div>
  </header>

  <main>
    <div class="flashcard-wrapper">
      <h1 class="page-title">Entraîne-toi à trouver la forme Past Simple des verbes irréguliers</h1>
      <p class="page-subtitle">
        Clique sur la carte pour voir la correction, puis reclique pour passer à une nouvelle phrase.
      </p>

      <div class="card-scene">
        <div class="flashcard" id="flashcard">
          <div class="card-face card-front">
            <span class="card-label">Français</span>
            <p class="card-text" id="frontText"></p>
          </div>

          <div class="card-face card-back">
            <span class="card-label">English</span>
            <p class="card-text" id="backText"></p>
          </div>
        </div>
      </div>

      <p class="helper-text">
        1er clic : voir la traduction • 2e clic : nouvelle carte
      </p>
    </div>
  </main>

  <script>
    const cards = [

      { fr: "be", en: "was / were" },
      { fr: "become", en: "became" },
      { fr: "begin", en: "began" },
      { fr: "break", en: "broke" },
      { fr: "bring", en: "brought" },
      { fr: "build", en: "built" },
      { fr: "buy", en: "bought" },
      { fr: "catch", en: "caught" },
      { fr: "choose", en: "chose" },
      { fr: "come", en: "came" },

      { fr: "cost", en: "cost" },
      { fr: "cut", en: "cut" },
      { fr: "do", en: "did" },
      { fr: "draw", en: "drew" },
      { fr: "drink", en: "drank" },
      { fr: "drive", en: "drove" },
      { fr: "eat", en: "ate" },
      { fr: "fall", en: "fell" },
      { fr: "feel", en: "felt" },
      { fr: "find", en: "found" },

      { fr: "fly", en: "flew" },
      { fr: "forget", en: "forgot" },
      { fr: "get", en: "got" },
      { fr: "give", en: "gave" },
      { fr: "go", en: "went" },
      { fr: "grow", en: "grew" },
      { fr: "have", en: "had" },
      { fr: "hear", en: "heard" },
      { fr: "hold", en: "held" },
      { fr: "keep", en: "kept" },

      { fr: "know", en: "knew" },
      { fr: "leave", en: "left" },
      { fr: "lend", en: "lent" },
      { fr: "let", en: "let" },
      { fr: "lose", en: "lost" },
      { fr: "make", en: "made" },
      { fr: "mean", en: "meant" },
      { fr: "meet", en: "met" },
      { fr: "pay", en: "paid" },
      { fr: "put", en: "put" },

      { fr: "read", en: "read" },
      { fr: "ride", en: "rode" },
      { fr: "ring", en: "rang" },
      { fr: "run", en: "ran" },
      { fr: "say", en: "said" },
      { fr: "see", en: "saw" },
      { fr: "sell", en: "sold" },
      { fr: "send", en: "sent" },
      { fr: "set", en: "set" },
      { fr: "show", en: "showed" },

      { fr: "shut", en: "shut" },
      { fr: "sing", en: "sang" },
      { fr: "sit", en: "sat" },
      { fr: "sleep", en: "slept" },
      { fr: "speak", en: "spoke" },
      { fr: "spend", en: "spent" },
      { fr: "stand", en: "stood" },
      { fr: "steal", en: "stole" },
      { fr: "swim", en: "swam" },
      { fr: "take", en: "took" },

      { fr: "teach", en: "taught" },
      { fr: "tell", en: "told" },
      { fr: "think", en: "thought" },
      { fr: "throw", en: "threw" },
      { fr: "understand", en: "understood" },
      { fr: "wake", en: "woke" },
      { fr: "wear", en: "wore" },
      { fr: "win", en: "won" },
      { fr: "write", en: "wrote" },

      // ---- AJOUTS POUR ARRIVER À 100 ----
      { fr: "arise", en: "arose" },
      { fr: "awake", en: "awoke" },
      { fr: "beat", en: "beat" },
      { fr: "bend", en: "bent" },
      { fr: "bet", en: "bet" },
      { fr: "bind", en: "bound" },
      { fr: "bite", en: "bit" },
      { fr: "bleed", en: "bled" },
      { fr: "blow", en: "blew" },
      { fr: "burst", en: "burst" },
      { fr: "dig", en: "dug" },
      { fr: "feed", en: "fed" },
      { fr: "fight", en: "fought" },
      { fr: "freeze", en: "froze" },
      { fr: "hang", en: "hung" },
      { fr: "hide", en: "hid" },
      { fr: "hit", en: "hit" },
      { fr: "hurt", en: "hurt" },
      { fr: "lay", en: "laid" },
      { fr: "lead", en: "led" },
      { fr: "light", en: "lit" }
    ];

    const flashcard = document.getElementById("flashcard");
    const frontText = document.getElementById("frontText");
    const backText = document.getElementById("backText");

    let currentIndex = 0;
    let isFront = true;

    function showCard(index) {
      frontText.textContent = cards[index].fr;
      backText.textContent = cards[index].en;
    }

    function nextCard() {
      let newIndex = currentIndex;

      if (cards.length > 1) {
        while (newIndex === currentIndex) {
          newIndex = Math.floor(Math.random() * cards.length);
        }
      }

      currentIndex = newIndex;
      showCard(currentIndex);
    }

    showCard(currentIndex);

    flashcard.addEventListener("click", () => {
      if (isFront) {
        flashcard.classList.add("is-flipped");
        isFront = false;
      } else {
        flashcard.classList.remove("is-flipped");
        isFront = true;

        // changer au milieu de l'animation (0.7s / 2)
        setTimeout(() => {
          nextCard();
        }, 200);
      }
    });
  </script>
  <script src="../theme.js"></script>
</body>

</html>
