  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--hero-bg);
      color: var(--text);
    }

    .site-header {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(8px);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .exercise-wrapper {
      width: 100%;
      max-width: 950px;
      text-align: center;
    }

    .page-title {
      font-size: 2rem;
      margin-bottom: 0.8rem;
      color: var(--text-strong);
    }

    .page-subtitle {
      color: var(--text-soft);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .prompt-card {
      min-height: 150px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-medium);
      padding: 1.3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .prompt-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      margin-bottom: 0.7rem;
    }

    .prompt-value {
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      font-weight: 800;
      color: var(--text-strong);
    }

    .answer-scene {
      perspective: 1200px;
      margin-top: 1rem;
      width: 100%;
    }

    .answer-card {
      width: 100%;
      min-height: 160px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      cursor: pointer;
    }

    .answer-card.is-flipped {
      transform: rotateX(180deg);
    }

    .answer-face {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      box-shadow: var(--shadow-medium);
      border: 1px solid var(--border);
    }

    .answer-front {
      background: var(--surface);
      color: var(--text-strong);
    }

    .answer-back {
      background: var(--primary);
      color: white;
      transform: rotateX(180deg);
    }

    .answer-text {
      font-size: clamp(1.5rem, 3vw, 2.3rem);
      font-weight: 800;
      line-height: 1.4;
    }

    .controls {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 0.9rem 1.5rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: white;
      box-shadow: var(--shadow-medium);
    }

    .helper-text {
      margin-top: 1rem;
      color: var(--text-soft);
      font-size: 0.95rem;
    }

    @media (max-width: 760px) {
      .prompt-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      main {
        padding: 1.2rem;
      }

      .prompt-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }

      .prompt-card {
        min-height: 125px;
        padding: 1rem;
      }

      .answer-card {
        min-height: 140px;
      }

      .answer-face {
        padding: 1.4rem;
      }

      .page-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

    const tenseText = document.getElementById("tenseText");
    const modeText = document.getElementById("modeText");
    const subjectText = document.getElementById("subjectText");
    const verbText = document.getElementById("verbText");

    const answerText = document.getElementById("answerText");

    const answerCard = document.getElementById("answerCard");
    const nextBtn = document.getElementById("nextBtn");

    let currentIndex = 0;
    let isFlipped = false;

    function showCard(index) {

      const card = cards[index];

      tenseText.textContent = card.tense;
      modeText.textContent = card.mode;
      subjectText.textContent = card.subject;
      verbText.textContent = card.verb;

      answerText.textContent = card.answer;
    }

    function nextCard() {

      if (isFlipped) {

        answerCard.classList.remove("is-flipped");
        isFlipped = false;

        setTimeout(() => {

          let newIndex = currentIndex;

          if (cards.length > 1) {

            while (newIndex === currentIndex) {
              newIndex = Math.floor(Math.random() * cards.length);
            }

          }

          currentIndex = newIndex;
          showCard(currentIndex);

        }, 500);

      } else {

        let newIndex = currentIndex;

        if (cards.length > 1) {

          while (newIndex === currentIndex) {
            newIndex = Math.floor(Math.random() * cards.length);
          }

        }

        currentIndex = newIndex;
        showCard(currentIndex);

      }

    }

    answerCard.addEventListener("click", () => {

      answerCard.classList.toggle("is-flipped");
      isFlipped = !isFlipped;

    });

    nextBtn.addEventListener("click", nextCard);

    showCard(currentIndex);

  </script>
