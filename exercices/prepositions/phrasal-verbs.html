<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Present Simple - Flashcards</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--hero-bg);
      color: var(--text);
    }

    .site-header {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(8px);
    }


    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .flashcard-wrapper {
      width: 100%;
      max-width: 700px;
      text-align: center;
    }

    .page-title {
      font-size: 2rem;
      margin-bottom: 0.8rem;
      color: var(--text-strong);
    }

    .page-subtitle {
      color: var(--text-soft);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .card-scene {
      perspective: 1200px;
    }

    .flashcard {
      width: 100%;
      min-height: 320px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      cursor: pointer;
    }

    .flashcard.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      backface-visibility: hidden;
      box-shadow: var(--shadow-medium);
      border: 1px solid var(--border);
    }

    .card-front {
      background: var(--surface);
      color: var(--text-strong);
    }

    .card-back {
      background: var(--primary);
      color: white;
      transform: rotateY(180deg);
    }

    .card-text {
      font-size: clamp(1.5rem, 3vw, 2.3rem);
      line-height: 1.4;
      font-weight: 700;
    }

    .card-label {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }

    .helper-text {
      margin-top: 1.5rem;
      color: var(--text-soft);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .flashcard {
        min-height: 260px;
      }

      .card-face {
        padding: 1.4rem;
      }

      .page-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

      <nav class="main-nav">

    <div class="flashcard-wrapper">

      </p>

      <div class="card-scene">

          </div>

          <div class="card-face card-back">
            <span class="card-label">English</span>
            <p class="card-text" id="backText"></p>
          </div>
        </div>
      </div>

      <p class="helper-text">
        1er clic : voir la traduction • 2e clic : nouvelle carte
      </p>
    </div>
  </main>

    const flashcard = document.getElementById("flashcard");
    const frontText = document.getElementById("frontText");
    const backText = document.getElementById("backText");

    let currentIndex = 0;
    let isFront = true;

    function showCard(index) {
      frontText.textContent = cards[index].fr;
      backText.textContent = cards[index].en;
    }

    function nextCard() {
      let newIndex = currentIndex;

      if (cards.length > 1) {
        while (newIndex === currentIndex) {
          newIndex = Math.floor(Math.random() * cards.length);
        }
      }

      currentIndex = newIndex;
      showCard(currentIndex);
    }

    showCard(currentIndex);

    flashcard.addEventListener("click", () => {
      if (isFront) {
        flashcard.classList.add("is-flipped");
        isFront = false;
      } else {
        flashcard.classList.remove("is-flipped");
        isFront = true;

        // changer au milieu de l'animation (0.7s / 2)
        setTimeout(() => {
          nextCard();
        }, 200);
      }
    });

</body>
