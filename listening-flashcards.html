<!DOCTYPE html>
<html lang="fr">

<head>
      <meta charset="UTF-8" />

      <title>Listening Flashcards - English Grammar Lab</title>
      <link rel="stylesheet" href="style.css" />

      <style>
            body {
                  min-height: 100vh;
                  display: flex;
                  flex-direction: column;
                  background: var(--hero-bg);
                  color: var(--text);
            }

            main {
                  flex: 1;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 2rem;
            }

            .listening-wrapper {
                  width: 100%;
                  max-width: 760px;
                  text-align: center;
            }

            .page-title {
                  font-size: clamp(1.8rem, 4vw, 2.5rem);
                  margin-bottom: 0.8rem;
                  color: var(--text-strong);
            }

            .page-subtitle {
                  color: var(--text-soft);
                  margin-bottom: 1.7rem;
                  font-size: 1rem;
            }

            .audio-player {
                  width: min(100%, 560px);
                  margin: 0 auto 1.5rem;
                  padding: 1rem 1.2rem;
                  border: 1px solid var(--border);
                  border-radius: 22px;
                  background: var(--surface);
                  box-shadow: var(--shadow-soft);
                  display: flex;
                  align-items: center;
                  gap: 1rem;
            }

            .play-button {
                  width: 54px;
                  height: 54px;
                  border: none;
                  border-radius: 50%;
                  background: var(--primary);
                  color: white;
                  display: grid;
                  place-items: center;
                  cursor: pointer;
                  box-shadow: var(--shadow-primary);
                  transition: transform 0.2s ease, background 0.2s ease;
                  flex: 0 0 auto;
            }

            .play-button:hover {
                  transform: translateY(-2px);
                  background: var(--primary-strong);
            }

            .play-icon {
                  font-size: 1.35rem;
                  line-height: 1;
                  margin-left: 2px;
            }

            .audio-bars {
                  height: 54px;
                  flex: 1;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 5px;
                  overflow: hidden;
            }

            .audio-bars span {
                  width: 5px;
                  height: 14px;
                  border-radius: 999px;
                  background: var(--primary);
                  opacity: 0.35;
                  transform-origin: center;
                  transition: opacity 0.2s ease;
            }

            .audio-player.is-playing .audio-bars span {
                  opacity: 0.9;
                  animation: soundWave 0.8s ease-in-out infinite;
            }

            .audio-bars span:nth-child(2n) {
                  animation-delay: 0.1s;
                  height: 24px;
            }

            .audio-bars span:nth-child(3n) {
                  animation-delay: 0.2s;
                  height: 34px;
            }

            .audio-bars span:nth-child(4n) {
                  animation-delay: 0.3s;
                  height: 20px;
            }

            .audio-bars span:nth-child(5n) {
                  animation-delay: 0.4s;
                  height: 40px;
            }

            @keyframes soundWave {

                  0%,
                  100% {
                        transform: scaleY(0.45);
                  }

                  50% {
                        transform: scaleY(1.25);
                  }
            }

            .audio-info {
                  font-size: 0.85rem;
                  color: var(--text-soft);
                  min-width: 70px;
                  text-align: right;
            }

            .card-scene {
                  perspective: 1200px;
            }

            .flashcard {
                  width: 100%;
                  min-height: 330px;
                  position: relative;
                  transform-style: preserve-3d;
                  transition: transform 0.7s ease;
                  cursor: pointer;
            }

            .flashcard.is-flipped {
                  transform: rotateY(180deg);
            }

            .card-face {
                  position: absolute;
                  inset: 0;
                  border-radius: 24px;
                  padding: 2rem;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  text-align: center;
                  backface-visibility: hidden;
                  box-shadow: var(--shadow-medium);
                  border: 1px solid var(--border);
            }

            .card-front {
                  background: var(--surface);
                  color: var(--text-strong);
            }

            .card-back {
                  background: var(--primary);
                  color: white;
                  transform: rotateY(180deg);
                  flex-direction: column;
                  gap: 1.2rem;
            }

            .card-label {
                  position: absolute;
                  top: 20px;
                  left: 20px;
                  font-size: 0.8rem;
                  font-weight: 700;
                  text-transform: uppercase;
                  letter-spacing: 0.08em;
                  opacity: 0.8;
            }

            .view-answer {
                  border: none;
                  border-radius: 999px;
                  padding: 1rem 1.6rem;
                  background: var(--primary);
                  color: white;
                  font-weight: 700;
                  cursor: pointer;
                  box-shadow: var(--shadow-primary);
                  transition: transform 0.2s ease, background 0.2s ease;
            }

            .view-answer:hover {
                  transform: translateY(-2px);
                  background: var(--primary-strong);
            }

            .transcription {
                  font-size: clamp(1.45rem, 3vw, 2.2rem);
                  line-height: 1.35;
                  font-weight: 800;
            }

            .translation {
                  font-size: clamp(1rem, 2vw, 1.25rem);
                  line-height: 1.5;
                  opacity: 0.92;
                  max-width: 620px;
            }

            .controls {
                  margin-top: 1.4rem;
                  display: flex;
                  justify-content: center;
                  gap: 0.8rem;
                  flex-wrap: wrap;
            }

            .control-button {
                  border: 1px solid var(--border-strong);
                  border-radius: 12px;
                  padding: 0.75rem 1rem;
                  background: var(--surface);
                  color: var(--text);
                  cursor: pointer;
                  font-weight: 700;
                  transition: transform 0.2s ease, border-color 0.2s ease;
            }

            .control-button:hover {
                  transform: translateY(-2px);
                  border-color: var(--primary);
            }

            .helper-text {
                  margin-top: 1rem;
                  color: var(--text-soft);
                  font-size: 0.92rem;
            }

            @media (max-width: 640px) {
                  main {
                        padding: 1.2rem;
                  }

                  .audio-player {
                        padding: 0.8rem;
                        gap: 0.7rem;
                  }

                  .play-button {
                        width: 48px;
                        height: 48px;
                  }

                  .audio-info {
                        display: none;
                  }

                  .flashcard {
                        min-height: 300px;
                  }

                  .card-face {
                        padding: 1.4rem;
                  }
            }
      </style>
</head>

            const audio = document.getElementById("audio");
            const audioPlayer = document.getElementById("audioPlayer");
            const playButton = document.getElementById("playButton");
            const playIcon = document.getElementById("playIcon");
            const replayButton = document.getElementById("replayButton");
            const nextButton = document.getElementById("nextButton");
            const flashcard = document.getElementById("flashcard");
            const transcriptionText = document.getElementById("transcriptionText");
            const translationText = document.getElementById("translationText");
            const audioCounter = document.getElementById("audioCounter");

            let currentIndex = 0;
            let isFront = true;

            function showCard(index) {
                  const card = cards[index];

                  audio.src = encodeURI(card.audio);
                  transcriptionText.textContent = card.transcription;
                  translationText.textContent = card.translation;
                  audioCounter.textContent = `${index + 1} / ${cards.length}`;

                  flashcard.classList.remove("is-flipped");
                  isFront = true;
                  audioPlayer.classList.remove("is-playing");
                  playIcon.textContent = "▶";
            }

            function playCurrentAudio() {
                  audio.currentTime = 0;
                  audio.play();
            }

            function nextCard() {
                  flashcard.classList.remove("is-flipped");

                  setTimeout(() => {
                        let newIndex = currentIndex;

                        if (cards.length > 1) {
                              while (newIndex === currentIndex) {
                                    newIndex = Math.floor(Math.random() * cards.length);
                              }
                        }

                        currentIndex = newIndex;
                        showCard(currentIndex);
                  }, 700);
            }

            playButton.addEventListener("click", () => {
                  if (audio.paused) {
                        audio.play();
                  } else {
                        audio.pause();
                  }
            });

            replayButton.addEventListener("click", playCurrentAudio);

            nextButton.addEventListener("click", nextCard);

            flashcard.addEventListener("click", () => {
                  if (isFront) {
                        flashcard.classList.add("is-flipped");
                        isFront = false;
                  }
            });

            audio.addEventListener("play", () => {
                  audioPlayer.classList.add("is-playing");
                  playIcon.textContent = "❚❚";
            });

            audio.addEventListener("pause", () => {
                  audioPlayer.classList.remove("is-playing");
                  playIcon.textContent = "▶";
            });

            audio.addEventListener("ended", () => {
                  audioPlayer.classList.remove("is-playing");
                  playIcon.textContent = "▶";
            });

            showCard(currentIndex);
      </script>
